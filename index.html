<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Space Shooter</title>
    <style>
        body {
            background: radial-gradient(circle at center, #151515 0%, #090909 70%, #000 100%);
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #score {
            font-size: 32px;
            color:#00ffcc;
            margin-bottom: 10px;
            text-shadow:
                0 0 5px #00ffff,
                0 0 12px #00ffff,
                0 0 20px #00ffff;
        }

        canvas {
            background-color: #000;
            border: 3px solid #00ffcc;
            border-radius: 10px;
            box-shadow:
                0 0 8px #00ffcc,
                0 0 16px #00ffcc,
                0 0 30px #00ffcc,
                inset 0 0 8px rgba(0,255,255,0.3);

            image-rendering:pixelated;
        }
        #gameFrame{
            padding:12px;
            border-radius:12px;
            background:#161616;
            border:2px solid #333;
            box-shadow:
                0 0 15px #00ffff,
                0 0 25px #00ffff,
                0 0 45px #00ffff,
                inset 0 0 12px rgba(0,255,255,0.2)
        }
    </style>
</head>
<body>

    <div id="score">Score: 0</div>
    <div id="gameFrame">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");

        let score = 0;
        let wave = 1;
        let keys = {};

        const player = {
            x: 300,
            y: 550,
            size: 15,
            speed: 5
        };

        let lasers = [];
        let enemies = [];

        window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

        function spawnEnemies() {
            let rows = 3;
            let cols = 6;
            let enemyWidth = 30;
            let enemyHeight = 20;
            let currentSpeed = 1 + (wave * 0.3);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    enemies.push({
                        x: 100 + (c * 60),
                        y: 50 + (r * 40),
                        width: enemyWidth,
                        height: enemyHeight,
                        speedX: currentSpeed
                    });
                }
            }
        }

        function handleInput() {
            if (keys["w"] && player.y > 50)  player.y -= player.speed;
            if (keys["s"] && player.y < 580) player.y += player.speed;
            if (keys["a"] && player.x > 20)  player.x -= player.speed;
            if (keys["d"] && player.x < 580) player.x += player.speed;

            if (keys["o"]) {
                keys["o"] = false;
                lasers.push({
                    x: player.x,
                    y: player.y - player.size,
                    speed: 7
                });
            }
        }

        function update() {
            handleInput();

            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= lasers[i].speed;
                if (lasers[i].y < 0) lasers.splice(i, 1);
            }

            let changeDirection = false;
            for (let i = 0; i < enemies.length; i++) {
                enemies[i].x += enemies[i].speedX;
                if (enemies[i].x + enemies[i].width > canvas.width || enemies[i].x < 0) {
                    changeDirection = true;
                }
            }

            if (changeDirection) {
                for (let i = 0; i < enemies.length; i++) {
                    enemies[i].speedX = -enemies[i].speedX;
                    enemies[i].y += 20;
                    if (enemies[i].y >= player.y) {
                        alert("Game Over! Final Score: " + score);
                        document.location.reload();
                    }
                }
            }

            for (let l = lasers.length - 1; l >= 0; l--) {
                for (let e = enemies.length - 1; e >= 0; e--) {
                    let laser = lasers[l];
                    let enemy = enemies[e];

                    if (laser && laser.x > enemy.x && laser.x < enemy.x + enemy.width &&
                        laser.y > enemy.y && laser.y < enemy.y + enemy.height) {
                        
                        enemies.splice(e, 1);
                        lasers.splice(l, 1);
                        score += 10;
                        scoreDisplay.innerText = "Score: " + score;
                        break;
                    }
                }
            }

            if (enemies.length === 0) {
                wave++;
                spawnEnemies();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "cyan";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.size);
            ctx.lineTo(player.x - player.size, player.y + player.size);
            ctx.lineTo(player.x + player.size, player.y + player.size);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = "yellow";
            for (let i = 0; i < lasers.length; i++) {
                ctx.fillRect(lasers[i].x - 2, lasers[i].y, 4, 10);
            }

            ctx.fillStyle = "red";
            for (let i = 0; i < enemies.length; i++) {
                ctx.fillRect(enemies[i].x, enemies[i].y, enemies[i].width, enemies[i].height);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        spawnEnemies();
        gameLoop();
    </script>
</body>
</html>
