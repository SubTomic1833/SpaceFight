<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Simple Space Shooter</title>
    <style>
        body {
            background: radial-gradient(circle at center, #151515 0%, #090909 70%, #000 100%);
            color: white;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #score {
            font-size: 18px;
            font-family: 'Press Start 2P', monospace;
            color: #00ffcc;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #00ffff;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 14px;
            border: 1px solid #00ffcc;
            border-radius: 6px;
            margin: 6px;
        }

        canvas {
            background-color: #000;
            border: 3px solid #00ffcc;
            border-radius: 10px;
            box-shadow:
                0 0 8px #00ffcc,
                0 0 16px #00ffcc,
                0 0 30px #00ffcc,
                inset 0 0 8px rgba(0,255,255,0.3);

            image-rendering:pixelated;
        }
        #gameFrame{
            padding:12px;
            border-radius:12px;
            background:#161616;
            border:2px solid #333;
            box-shadow:
                0 0 15px #00ffff,
                0 0 25px #00ffff,
                0 0 45px #00ffff,
                inset 0 0 12px rgba(0,255,255,0.2)
        }
        #wave{
            font-size: 18px;
            font-family: 'Press Start 2P', monospace;
            color: #00ffcc;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #00ffff;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 14px;
            border: 1px solid #00ffcc;
            border-radius: 6px;
            margin: 6px;
        }
        #title{
            font-size:28px;
            font-family:'Press Start 2P', monospace;
            color: #ff00ff;
            letter-spacing:3px;
            text-shadow:
                0 0 8px #ff00ff,
                0 0 16px #00ffff,
                0 0 24px #ff00ff;
            
            margin-bottom: 10px;
            text-align: center;
            animation: glowPulse 1.5s infinite alternate;
        }
        @keyframes glowPulse{
            from{
                transform: scale(1);
                filter:brightness(1);
            }
            to{
                transform:scale(1.05);
                filter:brightness(1.4);
            }
        }
    </style>
</head>
<body>
    <div id="title">SPACEFIGHT</div>
    <div id="score">Score: 0</div>
    <div id="wave">Wave: 1</div>
    <div id="gameFrame">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("score");
        const waveDisplay = document.getElementById("wave");

        let score = 0;
        let wave = 1;
        let keys = {};
        let waveInProgress=false;
        let shakeTime=0;
        let shakePower=0;
        let waveDropping = false;
        const player = {
            x: 300,
            y: 550,
            size: 15,
            speed: 5
        };

        let lasers = [];
        let enemies = [];
        let stars=[];
        let particles=[];
        let powerUps=[];
        let rapidFire=false;
        let doubleLaser=false;
        let shield=false;
        let rapidFireTime=0;
        let doubleLaserTime=0;
        let shieldTime=0;
        for(let i=0; i<75;i++){
            stars.push({
                x: Math.random() * canvas.width,
                y:Math.random() *canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 1 + 0.5
            });
        }

        window.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

        function spawnEnemies() {
            enemies=[];
            waveDropping=true;
            let rows = 3;
            let cols = 6;
            let enemyWidth = 30;
            let enemyHeight = 20;
            let currentSpeed = 1 + (wave * 0.3);

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    enemies.push({
                        x: 100 + (c * 60),
                        y: -200 + (r * 40),
                        targetY:50+(r*40),
                        width: enemyWidth,
                        height: enemyHeight,
                        speedX: currentSpeed,
                        dropSpeed:6 + Math.random() * 2
                    });
                }
            }
        }

        function handleInput() {
            if (keys["w"] && player.y > 50)  player.y -= player.speed;
            if (keys["s"] && player.y < 580) player.y += player.speed;
            if (keys["a"] && player.x > 20)  player.x -= player.speed;
            if (keys["d"] && player.x < 580) player.x += player.speed;

            if (keys["o"]) {
                keys["o"] = false;
                lasers.push({
                    x: player.x,
                    y: player.y - player.size,
                    speed: 7
                });
            }
        }
        function spawnExplosion(x,y){
            for(let i=0; i<12; i++){
                console.log("Explosion spawned");
                particles.push({
                    x:x,
                    y:y,
                    vx:(Math.random()-0.5)*4,
                    vy:(Math.random()-0.5)*4,
                    life:30,
                    size:Math.random()*3+2,
                    color: Math.random()>0.5 ? "#ff6600" : "#ffff66"
                });
            }
            if(Math.random()<0.15){
                const types=["rapid", "double", "shield"];
                const type=types[Math.floor(Math.random()*types.length)];

                powerUps.push({
                    x:x,
                    y:y,
                    type:type,
                    size:12,
                    speed:2
                });
            }
        }
        function update() {
            handleInput();
            if(waveDropping){
                let allSettled=true;

                for(let enemy of enemies){
                    if(enemy.y < enemy.targetY){
                        enemy.y += enemy.dropSpeed;
                        allSettled=false;
                    }
                }
                if(allSettled){
                    waveDropping=false;
                }
                return;
            }
            for(let star of stars){
                star.y += star.speed;

                if(star.y > canvas.height){
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].y -= lasers[i].speed;
                if (lasers[i].y < 0) lasers.splice(i, 1);
            }
            for (let i = powerUps.length - 1; i >= 0; i--) {
                const p = powerUps[i];
                p.y += p.speed;
                if (p.y > canvas.height) {
                    powerUps.splice(i, 1);
                }
            }
            let changeDirection = false;
            for (let i = 0; i < enemies.length; i++) {
                enemies[i].x += enemies[i].speedX;
                if (enemies[i].x + enemies[i].width > canvas.width || enemies[i].x < 0) {
                    changeDirection = true;
                }
            }

            if (changeDirection) {
                for (let i = 0; i < enemies.length; i++) {
                    enemies[i].speedX = -enemies[i].speedX;
                    enemies[i].y += 20;
                    if (enemies[i].y >= player.y) {
                        alert("Game Over! Final Score: " + score);
                        document.location.reload();
                    }
                }
            }

            for (let l = lasers.length - 1; l >= 0; l--) {
                if (!lasers[l]) continue;
                for (let e = enemies.length - 1; e >= 0; e--) {
                    if (!enemies[e]) continue;
                    let laser = lasers[l];
                    let enemy = enemies[e];
                    if (laser.x > enemy.x && laser.x < enemy.x + enemy.width && laser.y > enemy.y && laser.y < enemy.y + enemy.height) {
                        spawnExplosion(
                            enemy.x + enemy.width / 2,
                            enemy.y + enemy.height / 2
                        );
                        enemies.splice(e, 1);
                        lasers.splice(l, 1);
                        score += 10;
                        scoreDisplay.innerText = "Score: " + score;
                        break;
                    }
                }
            }
            for(let i=particles.length-1; i>=0;i--){
                const p = particles[i];
                if(!p || typeof p.x !== "number" || typeof p.vx !== "number"){
                    particles.splice(i,1);
                    continue;
                }

                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                if(p.life <= 0){
                    particles.splice(i,1);
                }
            }
            for(let i=powerUps.length-1;i >= 0; i--){
                const p=powerUps[i];
                p.y+=p.speed;
                if(p.x > player.x - player.size &&p.x < player.x + player.size &&p.y > player.y - player.size &&p.y < player.y + player.size){
                    if(p.type==="rapid"){
                        rapidFire=true;
                        rapidFireTime=600;
                    }
                    if(p.type==="double"){
                        doubleLaser=true;
                        doubleLaserTime=600;
                    }
                    if(p.type==="shield"){
                        shield=true;
                        shieldTime=600;
                    }
                    powerUps.splice(i,1);
                }
                if(p.y > canvas.height){
                    powerUps.splice(i,1);
                }
            }
            if (enemies.length === 0 && !waveInProgress) {
                waveInProgress=true;
                waveDropping=true;
                wave++;
                waveDisplay.innerText="Wave: " +wave;
                shakeTime=30;
                shakePower=18;
                setTimeout(() => {
                    spawnEnemies();
                    waveInProgress=false;
                }, 400)
            }
        }

        function draw() {
            let shakeX=0;
            let shakeY=0;

            if(shakeTime>0){
                shakeX=(Math.random()-0.5)*shakePower;
                shakeY=(Math.random()-0.5)*shakePower;

                shakeTime--;
                shakePower *= 0.9;
            }
            ctx.save();
            ctx.translate(shakeX,shakeY);
            ctx.fillStyle="rgba(0,0,0,0.3)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            for(let star of stars){
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }

            ctx.fillStyle = "cyan";
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.size);
            ctx.lineTo(player.x - player.size, player.y + player.size);
            ctx.lineTo(player.x + player.size, player.y + player.size);
            ctx.closePath();
            ctx.fill();
            for (let p of powerUps) {
                if (p.type === "rapid") ctx.fillStyle = "blue";
                if (p.type === "double") ctx.fillStyle = "green";
            if (p.type === "shield") ctx.fillStyle = "yellow";
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = "yellow";
            for (let i = 0; i < lasers.length; i++) {
                ctx.fillRect(lasers[i].x - 2, lasers[i].y, 4, 10);
            }

            ctx.fillStyle = "red";
            for (let i = 0; i < enemies.length; i++) {
                ctx.fillRect(enemies[i].x, enemies[i].y, enemies[i].width, enemies[i].height);
            }
            ctx.fillStyle="orange";
            for(let p of particles){
                ctx.globalAlpha=p.life/30;
                ctx.fillStyle=p.color;
                ctx.fillRect(p.x,p.y,p.size,p.size);
            }
            ctx.globalAlpha=1;
            ctx.restore();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        waveDropping=true;
        spawnEnemies();
        gameLoop();
    </script>
</body>
</html>
